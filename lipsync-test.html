<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>唇形同步修复验证 - LipSync Fix Verification</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; margin: 20px; }
    .test-section { border: 1px solid #444; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .pass { color: #4caf50; font-weight: bold; }
    .fail { color: #f44336; font-weight: bold; }
    .info { color: #2196f3; }
    .warning { color: #ff9800; }
    pre { background: #0d0d1a; padding: 10px; border-radius: 4px; overflow-x: auto; }
    canvas { border: 1px solid #555; display: block; margin: 10px 0; }
    button { padding: 8px 16px; margin: 5px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; }
    button:hover { background: #444; }
    #log { max-height: 400px; overflow-y: auto; }
    table { border-collapse: collapse; width: 100%; margin: 10px 0; }
    td, th { border: 1px solid #555; padding: 5px 10px; text-align: left; }
    th { background: #2a2a3e; }
  </style>
</head>
<body>
  <h1>🔬 唇形同步修复验证</h1>
  <p>验证 sigmoid DC 偏置修复 + viseme 队列清理 + 音频节点清理</p>

  <!-- 单元测试：sigmoid 修复 -->
  <div class="test-section">
    <h2>📋 测试 1: Sigmoid DC 偏置修复</h2>
    <p>验证修复后的 volume 计算在静音时返回 0（旧代码返回 ≈0.119）</p>
    <button onclick="testSigmoidFix()">运行测试</button>
    <div id="sigmoid-results"></div>
  </div>

  <!-- 单元测试：viseme 队列清理 -->
  <div class="test-section">
    <h2>📋 测试 2: Viseme 队列耗尽后自动关闭</h2>
    <p>验证 viseme 队列空 + 音频结束 + 静音时自动关闭 viseme 模式</p>
    <button onclick="testVisemeCleanup()">运行测试</button>
    <div id="viseme-results"></div>
  </div>

  <!-- 集成测试：VRM 模型唇形同步 -->
  <div class="test-section">
    <h2>📋 测试 3: VRM 模型唇形同步集成验证</h2>
    <p>加载 VRM 模型，模拟 TTS 播放，验证播放结束后嘴巴能完全闭合</p>
    <button onclick="runIntegrationTest()">运行集成测试</button>
    <button onclick="runIntegrationTestOld()">模拟旧代码（对照组）</button>
    <div id="vrm-canvas-container"></div>
    <div id="integration-results"></div>
  </div>

  <!-- 日志输出 -->
  <div class="test-section">
    <h2>📝 详细日志</h2>
    <div id="log"></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.module.js",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.4.0/lib/three-vrm.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { VRMLoaderPlugin } from '@pixiv/three-vrm';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.156.1/examples/jsm/loaders/GLTFLoader.js';

    // ============ 修复后的 LipSync 类（与项目代码一致）============
    const TIME_DOMAIN_DATA_LENGTH = 2048;

    class LipSyncFixed {
      constructor(audio) {
        this.audio = audio;
        this.analyser = audio.createAnalyser();
        this.timeDomainData = new Float32Array(TIME_DOMAIN_DATA_LENGTH);
        this._visemeQueue = [];
        this._currentViseme = "sil";
        this._visemeWeight = 0;
        this._playbackStartTime = 0;
        this._visemesActive = false;
        this._isPlaying = false;
        this._currentBufferSource = null;
      }

      setVisemeSequence(visemes) {
        this._visemeQueue = [...visemes];
        this._visemesActive = visemes.length > 0;
      }

      startVisemeSequence(visemes) {
        this._playbackStartTime = this.audio.currentTime;
        this.setVisemeSequence(visemes);
      }

      clearVisemeSequence() {
        this._visemeQueue = [];
        this._visemesActive = false;
        this._currentViseme = "sil";
        this._visemeWeight = 0;
      }

      setPlaying(value) { this._isPlaying = value; }
      get isPlaying() { return this._isPlaying; }

      update() {
        this.analyser.getFloatTimeDomainData(this.timeDomainData);
        let rawVolume = 0.0;
        for (let i = 0; i < TIME_DOMAIN_DATA_LENGTH; i++) {
          rawVolume = Math.max(rawVolume, Math.abs(this.timeDomainData[i]));
        }
        // 修复后：静音门限
        let volume = 0;
        if (rawVolume >= 0.01) {
          volume = 1 / (1 + Math.exp(-12 * rawVolume + 2));
          if (volume < 0.05) volume = 0;
        }
        const elapsed = this.audio.currentTime - this._playbackStartTime;
        let activeViseme = "sil";
        let activeWeight = 0;
        if (this._visemesActive) {
          this._visemeQueue = this._visemeQueue.filter(v => elapsed < v.endTime);
          for (const v of this._visemeQueue) {
            if (elapsed >= v.startTime && elapsed < v.endTime) {
              activeViseme = v.viseme;
              const mid = (v.startTime + v.endTime) / 2;
              const halfDur = (v.endTime - v.startTime) / 2;
              activeWeight = Math.max(0, 1 - Math.abs(elapsed - mid) / halfDur);
              break;
            }
          }
          if (this._visemeQueue.length === 0) {
            if (!this._isPlaying && rawVolume < 0.01) {
              this._visemesActive = false;
              this._currentViseme = "sil";
              this._visemeWeight = 0;
              return { volume: 0, viseme: "sil", visemeWeight: 0, visemesActive: false };
            }
            activeViseme = "sil";
            activeWeight = 0;
          }
          this._currentViseme = activeViseme;
          this._visemeWeight = activeWeight;
          return { volume, viseme: activeViseme, visemeWeight: activeWeight, visemesActive: true };
        }
        this._currentViseme = "sil";
        this._visemeWeight = 0;
        return { volume, viseme: "sil", visemeWeight: 0, visemesActive: false };
      }
    }

    // ============ 旧代码的 LipSync 类（对照组）============
    class LipSyncOld {
      constructor(audio) {
        this.audio = audio;
        this.analyser = audio.createAnalyser();
        this.timeDomainData = new Float32Array(TIME_DOMAIN_DATA_LENGTH);
        this._visemeQueue = [];
        this._visemesActive = false;
        this._playbackStartTime = 0;
      }

      clearVisemeSequence() {
        this._visemeQueue = [];
        this._visemesActive = false;
      }

      update() {
        this.analyser.getFloatTimeDomainData(this.timeDomainData);
        let volume = 0.0;
        for (let i = 0; i < TIME_DOMAIN_DATA_LENGTH; i++) {
          volume = Math.max(volume, Math.abs(this.timeDomainData[i]));
        }
        // 旧代码：sigmoid DC 偏置
        volume = 1 / (1 + Math.exp(-12 * volume + 2));
        if (volume < 0.05) volume = 0;
        const elapsed = this.audio.currentTime - this._playbackStartTime;
        if (this._visemesActive) {
          this._visemeQueue = this._visemeQueue.filter(v => elapsed < v.endTime);
          let activeViseme = "sil";
          let activeWeight = 0;
          for (const v of this._visemeQueue) {
            if (elapsed >= v.startTime && elapsed < v.endTime) {
              activeViseme = v.viseme;
              const mid = (v.startTime + v.endTime) / 2;
              const halfDur = (v.endTime - v.startTime) / 2;
              activeWeight = Math.max(0, 1 - Math.abs(elapsed - mid) / halfDur);
              break;
            }
          }
          if (this._visemeQueue.length === 0) {
            activeViseme = "sil";
            activeWeight = Math.min(volume * 0.5, 0.3); // 旧代码：用 sigmoid 偏置的 volume
          }
          return { volume, viseme: activeViseme, visemeWeight: activeWeight, visemesActive: true };
        }
        return { volume, viseme: "sil", visemeWeight: 0, visemesActive: false };
      }
    }

    // ============ 全局状态 ============
    let audioContext = null;
    let scene = null, renderer = null, camera = null, vrm = null;
    let lipSyncFixed = null, lipSyncOld = null;
    let animationId = null;
    let monitorData = [];

    window.log = function(msg, type = 'info') {
      const logDiv = document.getElementById('log');
      const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      const prefix = type === 'pass' ? '✅' : type === 'fail' ? '❌' : type === 'warning' ? '⚠️' : 'ℹ️';
      const entry = document.createElement('div');
      entry.className = type;
      entry.textContent = `[${time}] ${prefix} ${msg}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    };

    // ============ 测试 1: Sigmoid DC 偏置 ============
    window.testSigmoidFix = function() {
      const results = document.getElementById('sigmoid-results');
      let html = '<table><tr><th>原始音量</th><th>旧 sigmoid 输出</th><th>修复后输出</th><th>旧 > 0.08?</th><th>修复后 > 0.08?</th><th>结果</th></tr>';
      let allPass = true;
      const testValues = [0, 0.001, 0.005, 0.01, 0.02, 0.05, 0.1, 0.2, 0.5];

      for (const raw of testValues) {
        // 旧代码
        const oldVol = 1 / (1 + Math.exp(-12 * raw + 2));
        const oldVolChecked = oldVol < 0.05 ? 0 : oldVol;

        // 修复后
        let newVol = 0;
        if (raw >= 0.01) {
          newVol = 1 / (1 + Math.exp(-12 * raw + 2));
          if (newVol < 0.05) newVol = 0;
        }

        const oldAbove = oldVolChecked > 0.08;
        const newAbove = newVol > 0.08;
        // 修复目标：raw=0 时 newVol 应为 0，oldVol 不应为 0
        const isCorrect = (raw === 0) ? (newVol === 0 && oldVolChecked > 0) : true;
        if (!isCorrect) allPass = false;

        html += `<tr>
          <td>${raw.toFixed(3)}</td>
          <td>${oldVolChecked.toFixed(4)}</td>
          <td>${newVol.toFixed(4)}</td>
          <td class="${oldAbove ? 'fail' : 'pass'}">${oldAbove ? '是 ← 嘴一直张' : '否'}</td>
          <td class="${newAbove ? 'warning' : 'pass'}">${newAbove ? '是' : '否 ✓'}</td>
          <td class="${isCorrect ? 'pass' : 'fail'}">${isCorrect ? '通过' : '失败'}</td>
        </tr>`;
      }
      html += '</table>';
      html += `<p class="${allPass ? 'pass' : 'fail'}">总结：${allPass ? '所有测试通过！静音时 volume=0，嘴巴能正常闭合' : '测试失败！'}</p>`;
      html += `<p class="info">关键发现：旧代码在 rawVolume=0 时 sigmoid 输出 ${(1/(1+Math.exp(2))).toFixed(4)}，永远高于 0.08 阈值 → resetLipSync() 永不调用 → 嘴一直张</p>`;
      results.innerHTML = html;
      log('Sigmoid DC 偏置测试完成: ' + (allPass ? 'PASS' : 'FAIL'), allPass ? 'pass' : 'fail');
    };

    // ============ 测试 2: Viseme 队列清理 ============
    window.testVisemeCleanup = function() {
      const results = document.getElementById('viseme-results');
      if (!audioContext) audioContext = new AudioContext();
      if (!lipSyncFixed) lipSyncFixed = new LipSyncFixed(audioContext);

      // 设置 viseme 序列
      const visemes = [
        { viseme: "aa", startTime: 0, endTime: 0.5 },
        { viseme: "ee", startTime: 0.5, endTime: 1.0 },
        { viseme: "sil", startTime: 1.0, endTime: 1.3 },
      ];
      lipSyncFixed.startVisemeSequence(visemes);
      lipSyncFixed.setPlaying(false); // 模拟音频已结束
      lipSyncFixed._playbackStartTime = audioContext.currentTime - 2.0; // elapsed = 2.0，超过所有 viseme

      let html = '<table><tr><th>步骤</th><th>visemesActive</th><th>viseme</th><th>visemeWeight</th><th>volume</th><th>结果</th></tr>';

      // 第一次 update：队列应该空了
      const result = lipSyncFixed.update();
      const pass1 = !result.visemesActive && result.visemeWeight === 0;
      html += `<tr>
        <td>队列耗尽 + 静音</td>
        <td>${result.visemesActive}</td>
        <td>${result.viseme}</td>
        <td>${result.visemeWeight}</td>
        <td>${result.volume.toFixed(4)}</td>
        <td class="${pass1 ? 'pass' : 'fail'}">${pass1 ? '通过：自动关闭' : '失败'}</td>
      </tr>`;

      // 测试旧代码对照
      if (!lipSyncOld) lipSyncOld = new LipSyncOld(audioContext);
      lipSyncOld._visemeQueue = [{ viseme: "aa", startTime: 0, endTime: 0.5 }];
      lipSyncOld._visemesActive = true;
      lipSyncOld._playbackStartTime = audioContext.currentTime - 2.0;
      const oldResult = lipSyncOld.update();
      const oldPass = !oldResult.visemesActive && oldResult.visemeWeight === 0;
      html += `<tr>
        <td>旧代码对照</td>
        <td>${oldResult.visemesActive}</td>
        <td>${oldResult.viseme}</td>
        <td>${oldResult.visemeWeight.toFixed(4)}</td>
        <td>${oldResult.volume.toFixed(4)}</td>
        <td class="${oldPass ? 'pass' : 'fail'}">${oldPass ? '通过' : '失败：weight=' + oldResult.visemeWeight.toFixed(4) + ' 嘴不关'}</td>
      </tr>`;

      html += '</table>';
      results.innerHTML = html;
      log('Viseme 队列清理测试完成', 'pass');
    };

    // ============ 测试 3: VRM 集成测试 ============
    window.runIntegrationTest = async function() {
      await runVRMTest(false);
    };
    window.runIntegrationTestOld = async function() {
      await runVRMTest(true);
    };

    async function runVRMTest(useOldCode) {
      const results = document.getElementById('integration-results');
      results.innerHTML = `<p class="info">开始 ${useOldCode ? '旧代码（对照）' : '修复后'} 集成测试...</p>`;
      log(`开始 VRM 集成测试 (${useOldCode ? '旧代码' : '修复后'})`, 'info');

      try {
        // 初始化 Three.js 场景
        if (!scene) {
          scene = new THREE.Scene();
          camera = new THREE.PerspectiveCamera(30, 400 / 400, 0.1, 100);
          camera.position.set(0, 1.3, 2);
          camera.lookAt(0, 1.3, 0);

          const canvas = document.createElement('canvas');
          canvas.width = 400;
          canvas.height = 400;
          document.getElementById('vrm-canvas-container').innerHTML = '';
          document.getElementById('vrm-canvas-container').appendChild(canvas);
          renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
          renderer.setSize(400, 400);

          // 灯光
          const light = new THREE.DirectionalLight(0xffffff, 1.0);
          light.position.set(1, 1, 1);
          scene.add(light);

          // 加载 VRM
          log('加载 VRM 模型...', 'info');
          const loader = new GLTFLoader();
          loader.register((parser) => new VRMLoaderPlugin(parser));
          const vrmUrl = 'https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.4.0/examples/models/VRoidSample.vrm';
          const gltf = await loader.loadAsync(vrmUrl);
          vrm = gltf.userData.vrm;
          scene.add(vrm.scene);
          log('VRM 模型加载成功', 'pass');
        }

        if (!audioContext) audioContext = new AudioContext();

        // 创建 lipSync 实例
        const lipSync = useOldCode
          ? new LipSyncOld(audioContext)
          : new LipSyncFixed(audioContext);

        // 模拟 viseme 序列
        const visemes = [
          { viseme: "aa", startTime: 0, endTime: 0.3 },
          { viseme: "ee", startTime: 0.3, endTime: 0.6 },
          { viseme: "oh", startTime: 0.6, endTime: 0.9 },
          { viseme: "aa", startTime: 0.9, endTime: 1.2 },
          { viseme: "sil", startTime: 1.2, endTime: 1.5 },
        ];

        if (useOldCode) {
          lipSync._visemeQueue = [...visemes];
          lipSync._visemesActive = true;
          lipSync._playbackStartTime = audioContext.currentTime;
        } else {
          lipSync.startVisemeSequence(visemes);
          lipSync.setPlaying(true);
        }

        // 启动渲染 + 监控循环
        monitorData = [];
        const startTime = audioContext.currentTime;
        const monitorDuration = 3.0; // 监控 3 秒

        function monitorLoop() {
          const elapsed = audioContext.currentTime - startTime;
          const result = lipSync.update();

          // 获取 VRM 表情值
          let aaValue = 0, jawOpenValue = 0;
          if (vrm?.expressionManager) {
            const aaExpr = vrm.expressionManager.getExpression("aa");
            if (aaExpr) aaValue = vrm.expressionManager.getValue("aa") || 0;
            const jawExpr = vrm.expressionManager.getExpression("JawOpen");
            if (jawExpr) jawOpenValue = vrm.expressionManager.getValue("JawOpen") || 0;
          }

          // 模拟 model.ts 的行为
          if (result.visemesActive) {
            if (useOldCode) {
              if (result.visemeWeight > 0 && result.viseme) {
                // 旧代码会调用 lipSync("neutral", weight) 当 viseme=sil
                const preset = result.viseme === "sil" ? "neutral" : "aa";
                if (vrm?.expressionManager) {
                  const weight = result.visemeWeight * 0.5;
                  vrm.expressionManager.setValue(preset, weight);
                }
              }
            } else {
              if (result.visemeWeight > 0 && result.viseme && result.viseme !== "sil") {
                if (vrm?.expressionManager) {
                  vrm.expressionManager.setValue("aa", result.visemeWeight * 0.5);
                }
              } else if (result.volume > 0.08) {
                if (vrm?.expressionManager) {
                  vrm.expressionManager.setValue("aa", result.volume * 0.3);
                }
              } else {
                // 修复后：低音量 → resetLipSync
                if (vrm?.expressionManager) {
                  ["aa", "ee", "ih", "oh", "ou", "JawOpen"].forEach(p => {
                    vrm.expressionManager.setValue(p, 0);
                  });
                }
              }
            }
          } else {
            // fallback 分支
            if (result.volume > 0.08) {
              if (vrm?.expressionManager) {
                vrm.expressionManager.setValue("aa", result.volume * 0.4);
              }
            } else {
              // 修复后：resetLipSync
              if (!useOldCode) {
                if (vrm?.expressionManager) {
                  ["aa", "ee", "ih", "oh", "ou", "JawOpen"].forEach(p => {
                    vrm.expressionManager.setValue(p, 0);
                  });
                }
              }
              // 旧代码不会调用 resetLipSync，因为 volume 永远 > 0.08
            }
          }

          monitorData.push({
            time: elapsed.toFixed(2),
            visemesActive: result.visemesActive,
            viseme: result.viseme,
            visemeWeight: result.visemeWeight.toFixed(4),
            volume: result.volume.toFixed(4),
            aaValue: aaValue.toFixed(4),
            jawOpen: jawOpenValue.toFixed(4),
          });

          if (vrm) vrm.update(0.016);
          renderer.render(scene, camera);

          if (elapsed < monitorDuration) {
            animationId = requestAnimationFrame(monitorLoop);
          } else {
            // 测试结束，分析结果
            analyzeResults(useOldCode);
          }
        }

        // 模拟音频在 1.5 秒后结束
        if (!useOldCode) {
          setTimeout(() => {
            lipSync.setPlaying(false);
            log('模拟音频结束 (1.5s)', 'info');
          }, 1500);
        } else {
          // 旧代码：1.5 秒后调用 clearVisemeSequence
          setTimeout(() => {
            lipSync.clearVisemeSequence();
            log('旧代码：clearVisemeSequence() 调用', 'info');
          }, 1500);
        }

        monitorLoop();
      } catch (err) {
        log('VRM 集成测试失败: ' + err.message, 'fail');
        results.innerHTML = `<p class="fail">测试失败: ${err.message}</p>`;
      }
    }

    function analyzeResults(useOldCode) {
      const results = document.getElementById('integration-results');
      let html = `<h3>${useOldCode ? '旧代码（对照组）' : '修复后'} 监控数据</h3>`;
      html += '<table><tr><th>时间</th><th>visemesActive</th><th>viseme</th><th>visemeWeight</th><th>volume</th><th>aa值</th><th>JawOpen</th></tr>';

      // 采样关键时间点
      const keyTimes = [0.0, 0.5, 1.0, 1.5, 1.8, 2.0, 2.5, 3.0];
      let finalAaValue = 0;
      let mouthStaysOpen = false;

      for (const data of monitorData) {
        const t = parseFloat(data.time);
        if (keyTimes.some(kt => Math.abs(t - kt) < 0.06)) {
          html += `<tr>
            <td>${data.time}s</td>
            <td>${data.visemesActive}</td>
            <td>${data.viseme}</td>
            <td>${data.visemeWeight}</td>
            <td>${data.volume}</td>
            <td>${data.aaValue}</td>
            <td>${data.jawOpen}</td>
          </tr>`;
        }
      }

      // 获取最后几帧的数据
      const lastFrames = monitorData.slice(-10);
      const lastAaValues = lastFrames.map(d => parseFloat(d.aaValue));
      finalAaValue = lastAaValues.reduce((a, b) => a + b, 0) / lastAaValues.length;
      const maxLastAa = Math.max(...lastAaValues);

      // 判定标准：最后 10 帧的 aa 值应接近 0
      mouthStaysOpen = maxLastAa > 0.01;

      html += '</table>';
      html += `<p>最后 10 帧平均 aa 值: ${finalAaValue.toFixed(4)}</p>`;
      html += `<p>最后 10 帧最大 aa 值: ${maxLastAa.toFixed(4)}</p>`;
      html += `<p class="${mouthStaysOpen ? 'fail' : 'pass'}">结论: ${mouthStaysOpen ? '❌ 嘴巴一直张着（Bug 未修复）' : '✅ 嘴巴能正常闭合（修复成功）'}</p>`;

      if (useOldCode) {
        html += `<p class="warning">⚠️ 旧代码中：sigmoid DC 偏置导致 volume ≈ 0.119 > 0.08 阈值 → resetLipSync() 永不调用 → 嘴一直张</p>`;
      } else {
        html += `<p class="pass">✅ 修复后：sigmoid 前置门限 rawVolume < 0.01 → volume = 0 → volume ≤ 0.08 → resetLipSync() 被调用 → 嘴闭合</p>`;
      }

      results.innerHTML = html;
      log(`分析完成: ${mouthStaysOpen ? 'FAIL (嘴一直张)' : 'PASS (嘴闭合)'}`, mouthStaysOpen ? 'fail' : 'pass');
    }
  </script>
</body>
</html>
